name: CG-CI-CD Prototype

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  generate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate code from project artifact
        run: python generator/generate_code.py

      - name: Run tests
        run: pytest
